# ─── Entorno de DESARROLLO ───────────────────────────────────────────────────
# docker compose up -d
# Frontend : http://localhost:5173  (Vite hot-reload)
# API      : http://localhost:8000
# Mongo    : localhost:27017
# ─────────────────────────────────────────────────────────────────────────────
services:
  app_scada:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env.example
      - .env
    environment:
      # - MOCK_MODBUS=true
      - MONGODB_URI=mongodb://db_scada:27017
    depends_on:
      db_scada:
        condition: service_healthy
    volumes:
      - ./backend:/app

  db_scada:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app_scada

volumes:
  mongo_data:
