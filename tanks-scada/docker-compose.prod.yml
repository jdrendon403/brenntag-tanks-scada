# ─── Entorno de PRODUCCIÓN ────────────────────────────────────────────────────
# Requisitos previos:
#   1. Copiar .env.prod.example → .env.prod y configurar las variables.
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Único punto de entrada: http://<host>:${HTTP_PORT:-80}
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  app_scada:
    build: ./backend
    restart: unless-stopped
    environment:
      - MOCK_MODBUS=${MOCK_MODBUS:-false}
      - PLC_HOST=${PLC_HOST}
      - PLC_PORT=${PLC_PORT:-502}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB=${MONGODB_DB:-scada_tanks}
      - POLLING_INTERVAL=${POLLING_INTERVAL:-1.0}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
    depends_on:
      db_scada:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL",
             "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── MongoDB ────────────────────────────────────────────────────────────────
  db_scada:
    image: mongo:7
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGODB_DB:-scada_tanks}
    volumes:
      - mongo_data_prod:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Nginx — proxy + frontend estático ─────────────────────────────────────
  proxy_web:
    build:
      context: ./frontend
      dockerfile: Dockerfile          # multi-stage: node build → nginx serve
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      app_scada:
        condition: service_healthy

volumes:
  mongo_data_prod:
